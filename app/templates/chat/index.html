{% extends "base.html" %}

{% block title %}AI Chat - AI Student Assistant{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <h1 class="h3 mb-4"><i class="bi bi-chat-dots"></i> AI Chat Tutor</h1>

    <div class="row h-75">
        <div class="col-md-9">
            <div class="card h-100 d-flex flex-column">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Ask Your Questions</h5>
                </div>
                <div class="card-body flex-grow-1 overflow-auto" id="chatContainer" style="height: 500px;">
                    <div id="messages">
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i> Welcome! Ask any academic question and I'll help you.
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <form id="chatForm" onsubmit="sendMessage(event)">
                        <div class="input-group">
                            <input type="text" class="form-control" id="messageInput" placeholder="Type your question..." required>
                            <button class="btn btn-primary" type="submit">
                                <i class="bi bi-send"></i> Send
                            </button>
                            <button class="btn btn-outline-danger" type="button" onclick="clearChat()">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0">Subject</h5>
                </div>
                <div class="card-body">
                    <select class="form-select" id="subjectSelect">
                        <option value="General">General</option>
                        <option value="English">English</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Biology">Biology</option>
                        <option value="Geography">Geography</option>
                        <option value="History">History</option>
                        <option value="Economics">Economics</option>
                        <option value="Artificial Intelligence">AI</option>
                    </select>
                </div>
            </div>
            <div class="card mt-3">
                <div class="card-header bg-warning">
                    <h5 class="mb-0">Chat History</h5>
                </div>
                <div class="card-body" style="max-height: 400px; overflow-y: auto;">
                    <div id="historyContainer">
                        <p class="text-muted small">Loading...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function sendMessage(event) {
    event.preventDefault();
    const message = document.getElementById('messageInput').value;
    const subject = document.getElementById('subjectSelect').value;
    
    // Add user message to chat
    const messagesDiv = document.getElementById('messages');
    messagesDiv.innerHTML += `
        <div class="mb-3">
            <div class="alert alert-primary">` + message + `</div>
        </div>
    `;
    
    // Send to server
    fetch('/chat/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: message, subject: subject})
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            messagesDiv.innerHTML += `
                <div class="mb-3">
                    <div class="alert alert-success">` + data.response + `</div>
                </div>
            `;
        }
        document.getElementById('messageInput').value = '';
        document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
    });
}

function clearChat() {
    if (confirm('Clear all chat history?')) {
        fetch('/chat/clear', {method: 'POST'})
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                document.getElementById('messages').innerHTML = '<div class="alert alert-info">Chat cleared. Start fresh!</div>';
            }
        });
    }
}
</script>
{% endblock %}
