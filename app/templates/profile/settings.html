{% extends "base.html" %}

{% block title %}Settings - AI Student Assistant{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <h1 class="h3 mb-4"><i class="bi bi-gear"></i> Settings</h1>

    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Preferences</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="theme" class="form-label">Theme</label>
                            <select class="form-select" id="theme" name="theme" required>
                                <option value="light" {% if user.theme == 'light' %}selected{% endif %}>Light</option>
                                <option value="dark" {% if user.theme == 'dark' %}selected{% endif %}>Dark</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Settings</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
